<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dojo Ninja</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/index.css">

</head>

<body>

<button id="showPanelBtn">☰</button>

<div id="leftColumn">
  <div id="versionBox" class="versionBox"></div>
  <button id="hidePanelBtn">Ocultar panel</button>

  <button id="showRewardsBtn">🎁 Ver premios</button>

  <div>
    <div class="sectionTitle">Número de puertas</div>
      <select id="doorCount" style="width:100%; padding:6px; border-radius:6px; font-size:1rem;">
        <option value="2">2 puertas</option>
        <option value="3">3 puertas</option>
        <option value="4">4 puertas</option>
        <option value="5" selected>5 puertas</option>
      </select>
  </div>

  <div id="syllablePanel">
    <div class="sectionTitle">Elegir sílabas</div>
    <div id="lettersContainer"></div>
  </div>

  <div class="optionRow">
    <input type="checkbox" id="changeOnFail">
    <label for="changeOnFail">Cambiar palabras y puertas al fallar</label>
  </div>
  <div class="optionRow">
    <input type="checkbox" id="sameVowel">
    <label for="sameVowel">Todas las sílabas con la misma vocal</label>
  </div>

</div>

  <div id="gameArea">
    <div id="darkLayer"></div>

    <div id="progressContainer"> 
      <div id="progressBar"></div> 
    </div> 

    <button class="listen-btn" onclick="speakSyllable()">🔊 Escuchar sílaba</button>

    <div class="doors" id="doors"></div>
  </div>

  <img id="rewardImage">

  <audio id="sndCorrect" src="sound/correct.mp3"></audio>
  <audio id="sndWrong" src="sound/wrong.mp3"></audio>
  <!--<audio id="sndDoor" src="sound/door.mp3"></audio>-->
  <audio id="sndPrize" src="sound/prize.mp3"></audio>
  <audio id="sndBalloons" src="sound/balloons.mp3"></audio>
  <audio id="sndPop" src="sound/pop.mp3"></audio>
<div id="rewardsDialog" class="dialog">
  <div class="dialogContent">
    
    <button class="closeDialogBtn" id="closeRewardsX">✕</button>

    <h2>Premios conseguidos</h2>

    <div id="rewardsList"></div>

    <div class="dialogActions">
      <button id="resetRewardsBtn" class="resetBtn">Resetear premios</button>
      <button id="closeRewardsBtn" class="closeBtn">Cerrar</button>
    </div>

  </div>
</div>


<script src="js/index.js"  ></script>

</body>
</html>
